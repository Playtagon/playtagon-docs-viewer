<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Docs Viewer</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2319736c'/%3E%3Cpath d='M18 14h22l8 8v28H18z' fill='white'/%3E%3Cpath d='M39 14v10h9' fill='%23dfe4df'/%3E%3Cpath d='M24 33h18M24 41h14' stroke='%2319736c' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <aside class="sidebar" aria-label="Docs navigation">
        <div class="sidebar-header">
          <a class="brand" href="/">Docs Viewer</a>
          <div class="sidebar-settings">
            <button id="settingsLink" class="icon-text-button is-secondary" type="button" title="Settings" aria-label="Settings">
              <i class="ti ti-settings" aria-hidden="true"></i>
            </button>
          </div>
        </div>
        <div id="authStatus" class="auth-status" hidden></div>
        <div class="sidebar-tool-bar" aria-label="Navigation tools">
          <button id="searchToggle" class="tool-icon-button" type="button" title="Search" aria-label="Search" aria-expanded="false">
            <i class="ti ti-search" aria-hidden="true"></i>
          </button>
          <button id="expandTree" class="tool-icon-button" type="button" title="Expand all" aria-label="Expand all">
            <i class="ti ti-arrow-autofit-height" aria-hidden="true"></i>
          </button>
          <button id="collapseTree" class="tool-icon-button" type="button" title="Collapse all" aria-label="Collapse all">
            <i class="ti ti-fold" aria-hidden="true"></i>
          </button>
          <button id="roadmapLink" class="tool-icon-button is-primary" type="button" title="Roadmap" aria-label="Roadmap">
            <i class="ti ti-map" aria-hidden="true"></i>
          </button>
        </div>
        <label class="search">
          <input id="searchInput" type="search" autocomplete="off" />
        </label>
        <nav id="tree" class="tree"></nav>
      </aside>
      <main class="main">
        <header class="topbar">
          <div id="breadcrumbs" class="breadcrumbs"></div>
          <div class="topbar-meta">
            <div id="pageMeta" class="page-meta"></div>
            <button id="refreshDocs" class="refresh-docs" type="button" title="Rebuild and refresh docs">
              <i class="ti ti-refresh" aria-hidden="true"></i>
              <span>Refresh</span>
            </button>
          </div>
        </header>
        <section id="content" class="content"></section>
      </main>
      <header class="mobile-shellbar">
        <a class="mobile-brand" href="/">Docs Viewer</a>
        <button id="mobileMenuToggle" class="mobile-menu-button" type="button" aria-label="Open menu" aria-expanded="false">
          <i class="ti ti-menu-2" aria-hidden="true"></i>
        </button>
      </header>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
